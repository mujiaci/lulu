<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>音乐播放器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Serif SC','Songti SC',serif;background:#1a1814;display:flex;align-items:center;justify-content:center}

.card{width:320px;background:linear-gradient(145deg,#2a2520,#1e1b16);border-radius:24px;border:1px solid #3d362e;box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 0 1px rgba(255,220,180,.05);padding:28px 24px 20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,200,150,.2),transparent)}

/* Header */
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.hd h1{font-size:15px;font-weight:700;color:#d4c4a8;letter-spacing:2px}
.add-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid #5a4d3e;background:transparent;color:#a08e70;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.add-btn:active{background:#5a4d3e;color:#e8d5b5}

/* Song list */
.songs{max-height:200px;overflow-y:auto;margin-bottom:16px}
.songs::-webkit-scrollbar{width:3px}
.songs::-webkit-scrollbar-thumb{background:#3d362e;border-radius:3px}
.sg{display:flex;align-items:center;padding:8px 10px;gap:10px;border-radius:12px;cursor:pointer;transition:background .15s}
.sg:active{background:rgba(255,200,150,.08)}
.sg.on{background:rgba(255,200,150,.12)}
.sg .sn{width:28px;height:28px;border-radius:8px;background:#3d362e;display:flex;align-items:center;justify-content:center;font-size:12px;color:#a08e70;flex-shrink:0}
.sg.on .sn{background:#8b7355;color:#f5e6cc}
.sg .sf{flex:1;min-width:0}
.sg .st{font-size:13px;color:#c9b896;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sg .sa{font-size:10px;color:#6b5d4d;margin-top:1px}
.sg .sx{width:24px;height:24px;border:none;background:none;color:#5a4d3e;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%}
.sg .sx:active{color:#c45050}

.empty{text-align:center;padding:30px 10px;color:#5a4d3e;font-size:12px;line-height:1.8}
.empty .ei{font-size:28px;margin-bottom:8px;opacity:.5}

/* Now playing */
.np{background:linear-gradient(135deg,#332d24,#2a2520);border-radius:16px;padding:14px 16px;margin-bottom:14px;border:1px solid #3d362e}
.np .nt{font-size:14px;font-weight:700;color:#e8d5b5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:18px}
.np .ns{font-size:10px;color:#6b5d4d;margin-top:4px;letter-spacing:1px}

/* Controls */
.ctrl{display:flex;align-items:center;justify-content:center;gap:16px}
.cb{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.cb.main{width:48px;height:48px;background:linear-gradient(145deg,#8b7355,#6b5a42);color:#f5e6cc;box-shadow:0 4px 16px rgba(139,115,85,.3)}
.cb.main:active{transform:scale(.93);box-shadow:0 2px 8px rgba(139,115,85,.2)}
.cb.sec{background:transparent;border:1.5px solid #3d362e;color:#a08e70}
.cb.sec:active{background:#3d362e}

/* Decorative vinyl */
.vinyl{width:44px;height:44px;border-radius:50%;background:conic-gradient(from 0deg,#1a1814,#2a2520,#1a1814,#2a2520,#1a1814);border:2px solid #3d362e;position:absolute;top:20px;right:24px;animation:spin 4s linear infinite paused}
.vinyl.on{animation-play-state:running}
.vinyl::after{content:'';position:absolute;top:50%;left:50%;width:12px;height:12px;border-radius:50%;background:#8b7355;transform:translate(-50%,-50%)}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2a2520;color:#d4c4a8;padding:8px 18px;border-radius:20px;font-size:12px;border:1px solid #3d362e;display:none;z-index:9}
</style>
</head>
<body>
<div class="card">
  <div class="vinyl" id="vinyl"></div>
  <div class="hd">
    <h1>♫ 音乐</h1>
    <button class="add-btn" onclick="imp()">+</button>
  </div>
  <div class="songs" id="L">
    <div class="empty"><div class="ei">♫</div>导入 mp3 开始聆听</div>
  </div>
  <div class="np">
    <div class="nt" id="T">未在播放</div>
    <div class="ns" id="S">· · ·</div>
  </div>
  <div class="ctrl">
    <button class="cb sec" onclick="stp()">■</button>
    <button class="cb main" id="P" onclick="tgl()">▶</button>
    <button class="cb sec" onclick="nxt()">▲</button>
  </div>
</div>
<div id="toast" class="toast"></div>
<script>
var sg=[],st="stopped",cr=null,ci=-1;
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.style.display="block";setTimeout(function(){t.style.display="none"},2000)}
function esc(s){return s.replace(/&/g,"&").replace(/</g,"<").replace(/>/g,">")}
async function load(){sg=[];try{var k=await Bridge.listData();var sk=k.filter(function(x){return x.startsWith("song_")});for(var i=0;i<sk.length;i++){var v=await Bridge.getData(sk[i]);if(v)try{sg.push(JSON.parse(v))}catch(e){}}sg.sort(function(a,b){return(a.title||"").localeCompare(b.title||"")})}catch(e){}ren()}
function ren(){var el=document.getElementById("L");if(!sg.length){el.innerHTML='<div class="empty"><div class="ei">♫</div>导入 mp3 开始聆听</div>';return}var h="";for(var i=0;i<sg.length;i++){var s=sg[i],on=cr&&cr.filePath===s.filePath?" on":"";h+='<div class="sg'+on+'" onclick="ply('+i+')"><div class="sn">'+(on?"♫":"♪")+'</div><div class="sf"><div class="st">'+esc(s.title)+'</div><div class="sa">'+esc(s.artist||"未知")+'</div></div><button class="sx" onclick="event.stopPropagation();del('+i+')">✕</button></div>'}el.innerHTML=h}
async function imp(){try{var r=await Bridge.pickBinaryFile();if(!r||!r.success){toast("取消");return}var n=r.fileName||"a.mp3",ci2=n.lastIndexOf("/");if(ci2>=0)n=n.substring(ci2+1);var di=n.lastIndexOf("."),t=di>0?n.substring(0,di):n;var fp=await Bridge.writeFile("music/"+n,r.base64);if(!fp){toast("失败");return}var o={title:t,artist:"",filePath:fp,fileName:n};await Bridge.setData("song_"+t,JSON.stringify(o));toast("已导入："+t);load()}catch(e){toast("失败："+e.message)}}
async function ply(i){if(i<0||i>=sg.length)return;var s=sg[i];try{await Bridge.musicPlay(s.filePath,s.title,s.artist||"");cr=s;ci=i;st="playing";ui();ren()}catch(e){toast(e.message)}}
async function tgl(){if(st==="playing"){try{await Bridge.musicPause();st="paused"}catch(e){}}else if(st==="paused"){try{await Bridge.musicResume();st="playing"}catch(e){}}else if(cr){try{await Bridge.musicPlay(cr.filePath,cr.title,cr.artist||"");st="playing"}catch(e){}}else if(sg.length){ply(0);return}ui()}
async function stp(){try{await Bridge.musicStop();st="stopped"}catch(e){}ui();ren()}
async function nxt(){if(sg.length){var ni=(ci+1)%sg.length;ply(ni)}}
function ui(){var t=document.getElementById("T"),s=document.getElementById("S"),p=document.getElementById("P"),v=document.getElementById("vinyl");if(cr)t.textContent=cr.title;var labels={playing:"♪ 播放中",paused:"❚❚ 已暂停",stopped:"· · ·"};s.textContent=labels[st]||st;p.textContent=st==="playing"?"❚❚":"▶";v.className=st==="playing"?"vinyl on":"vinyl"}
async function poll(){try{var c=await Bridge.getData("__music_cmd");if(c){await Bridge.setData("__music_cmd","");try{var o=JSON.parse(c);if(o.action==="play"){var f=sg.find(function(s){return s.filePath===o.filePath});if(f){cr=f;await Bridge.musicPlay(f.filePath,o.title||f.title,o.artist||f.artist||"")}else if(o.filePath){await Bridge.musicPlay(o.filePath,o.title||"",o.artist||"");cr={title:o.title||"",artist:o.artist||"",filePath:o.filePath}}st="playing"}else if(o.action==="pause"){await Bridge.musicPause();st="paused"}else if(o.action==="resume"){await Bridge.musicResume();st="playing"}else if(o.action==="stop"){await Bridge.musicStop();st="stopped"}ui();ren()}catch(e){}}var ss=JSON.stringify({state:st,title:cr?cr.title:"",artist:cr?cr.artist:""});await Bridge.setData("__music_status",ss)}catch(e){}setTimeout(poll,1500)}
async function del(i){if(i<0||i>=sg.length)return;var s=sg[i];if(confirm("删除 "+s.title+"？")){try{await Bridge.deleteData("song_"+s.title);if(s.fileName)await Bridge.deleteFile("music/"+s.fileName);if(cr&&cr.filePath===s.filePath){stp();cr=null;ui()}toast("已删");load()}catch(e){toast("失败")}}}
load();poll();
</script>
</body>
</html>
