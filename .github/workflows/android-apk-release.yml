name: Android APK Release

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "APK type to build"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build and publish APK
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.build_type || 'release' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          elif [ ! -f app/google-services.json ]; then
            echo "::error title=Missing GOOGLE_SERVICES_JSON::Add the Firebase google-services.json content to the GOOGLE_SERVICES_JSON repository secret."
            exit 1
          fi

      - name: Restore release signing files
        if: env.BUILD_TYPE == 'release'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "::error title=Missing signing secrets::Release builds require ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD."
            exit 1
          fi

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
          {
            echo "storeFile=../release.keystore"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > local.properties

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: |
          variant="$(tr '[:lower:]' '[:upper:]' <<< "${BUILD_TYPE:0:1}")${BUILD_TYPE:1}"
          ./gradlew --no-daemon ":app:assemble${variant}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lulu-${{ env.BUILD_TYPE }}-apk
          path: app/build/outputs/apk/${{ env.BUILD_TYPE }}/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="manual-${GITHUB_RUN_NUMBER}-${BUILD_TYPE}"
          fi

          title="Lulu ${tag}"
          notes="Automated ${BUILD_TYPE} APK build from ${GITHUB_SHA}."

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" app/build/outputs/apk/${BUILD_TYPE}/*.apk --clobber
          else
            gh release create "$tag" app/build/outputs/apk/${BUILD_TYPE}/*.apk --title "$title" --notes "$notes"
          fi
