name: Complete context source refactor

on:
  push:
    paths:
      - '.github/workflows/context-source-refactor.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refactor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Apply source-level context refactor
        run: |
          python3 <<'PY'
          from pathlib import Path

          gen = Path('app/src/main/java/me/rerere/rikkahub/data/ai/GenerationHandler.kt')
          text = gen.read_text()
          old = '''        val internalMessages = preTransformMessages.transforms(
              transformers = transformers,
              context = context,
              model = model,
              assistant = assistant,
              settings = settings,
              processingStatus = processingStatus,
          )
          val breakdown = buildGenerationTokenBreakdown('''
          new = '''        val transformedMessages = preTransformMessages.transforms(
              transformers = transformers,
              context = context,
              model = model,
              assistant = assistant,
              settings = settings,
              processingStatus = processingStatus,
          )
          val finalContext = enforceFinalCompanionContextBudget(
              messages = transformedMessages,
              source = apiUsageSource,
          )
          val internalMessages = finalContext.messages
          Log.i(
              TAG,
              "final context: ${finalContext.estimatedTokens} tokens, " +
                  "dropped=${finalContext.droppedMessages}, compacted=${finalContext.compactedSystemMessages}",
          )
          val breakdown = buildGenerationTokenBreakdown('''
          if old not in text:
              raise SystemExit('GenerationHandler transform block not found')
          gen.write_text(text.replace(old, new, 1))

          perception = Path('app/src/main/java/me/rerere/rikkahub/data/companion/CompanionPerception.kt')
          text = perception.read_text()
          replacements = {
              'private const val MAX_MEMORY_CONTEXT_LENGTH = 6_000': 'private const val MAX_MEMORY_CONTEXT_LENGTH = 4_000',
              'private const val MAX_RECENT_TURNS = 12': 'private const val MAX_RECENT_TURNS = 8',
              'private const val MAX_CONTEXT_FACTS = 32': 'private const val MAX_CONTEXT_FACTS = 12',
              'private const val MAX_CONTEXT_VALUE_LENGTH = 500': 'private const val MAX_CONTEXT_VALUE_LENGTH = 240',
              'private const val MAX_ACTIVE_CONCERNS = 50': 'private const val MAX_ACTIVE_CONCERNS = 12',
              'private const val MAX_ACTIONABLE_COMMITMENTS = 50': 'private const val MAX_ACTIONABLE_COMMITMENTS = 12',
              'private const val MAX_ACTIVE_GOALS = 12': 'private const val MAX_ACTIVE_GOALS = 6',
              'private const val MAX_RECENT_LIFE_EVENTS = 20': 'private const val MAX_RECENT_LIFE_EVENTS = 8',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing constant: {old}')
              text = text.replace(old, new, 1)

          old = '''    snapshot.continuity.takeIf { continuity ->
          continuity.updatedAt > 0L &&
              (continuity.lastUserText.isNotBlank() || continuity.lastAssistantText.isNotBlank())
      }?.let { continuity ->
          appendLine("cross_modal_continuity conversation=${continuity.conversationId.orEmpty()} modality=${continuity.modality.name} at=${continuity.updatedAt}")
          continuity.lastUserText.takeIf(String::isNotBlank)?.let { appendLine("- previous_user=${it.take(800)}") }
          continuity.lastAssistantText.takeIf(String::isNotBlank)?.let { appendLine("- previous_assistant=${it.take(800)}") }
          appendLine("- instruction=Continue naturally when the latest input follows this exchange. Preserve prior stance, promises, unresolved threads, and forms of address unless the user corrects them. Never recite this record.")
      }'''
          new = '''    snapshot.continuity.takeIf { continuity ->
          continuity.updatedAt > 0L &&
              (continuity.lastUserText.isNotBlank() || continuity.lastAssistantText.isNotBlank()) &&
              !recentTurns.any { turn ->
                  turn.content.contains(continuity.lastUserText.take(120), ignoreCase = true) ||
                      turn.content.contains(continuity.lastAssistantText.take(120), ignoreCase = true)
              }
      }?.let { continuity ->
          appendLine("cross_modal_continuity modality=${continuity.modality.name} at=${continuity.updatedAt}")
          continuity.lastUserText.takeIf(String::isNotBlank)?.let { appendLine("- previous_user=${it.take(280)}") }
          continuity.lastAssistantText.takeIf(String::isNotBlank)?.let { appendLine("- previous_assistant=${it.take(280)}") }
          appendLine("- continue naturally; do not recite this record")
      }'''
          if old not in text:
              raise SystemExit('continuity block not found')
          text = text.replace(old, new, 1)

          swaps = {
              'impression.relationshipNarrative.takeIf(String::isNotBlank)?.let { appendLine("- relationship_narrative=${it.take(600)}") }': 'impression.relationshipNarrative.takeIf(String::isNotBlank)?.let { appendLine("- relationship_narrative=${it.take(320)}") }',
              'impression.userPortrait.takeIf(String::isNotBlank)?.let { appendLine("- user_portrait=${it.take(600)}") }': 'impression.userPortrait.takeIf(String::isNotBlank)?.let { appendLine("- user_portrait=${it.take(320)}") }',
              'impression.interactionUnderstanding.takeIf(String::isNotBlank)?.let { appendLine("- interaction_understanding=${it.take(600)}") }': 'impression.interactionUnderstanding.takeIf(String::isNotBlank)?.let { appendLine("- interaction_understanding=${it.take(280)}") }',
              'impression.unresolvedMatters.takeLast(3).forEach': 'impression.unresolvedMatters.takeLast(2).forEach',
              'impression.summary.takeIf(String::isNotBlank)?.let { appendLine("- legacy_summary=${it.take(300)}") }': 'impression.summary.takeIf(String::isNotBlank)?.let { appendLine("- legacy_summary=${it.take(180)}") }',
              'impression.observedTraits.take(4).forEach': 'impression.observedTraits.take(2).forEach',
              'impression.preferences.take(4).forEach': 'impression.preferences.take(2).forEach',
              'impression.boundaries.take(4).forEach': 'impression.boundaries.take(2).forEach',
              'impression.recentChanges.takeLast(3).forEach': 'impression.recentChanges.takeLast(2).forEach',
              'activeConcerns.take(8).forEach': 'activeConcerns.distinctBy { it.subjectKey.trim().lowercase() }.take(4).forEach',
              'goal=${concern.goal.take(180)}': 'goal=${concern.goal.take(120)}',
              'actionableCommitments.take(8).forEach': 'actionableCommitments.distinctBy { it.promise.trim().lowercase() }.take(4).forEach',
              '"- id=${commitment.id} due=${commitment.dueAt} status=${commitment.status.name} " +\n                    "overdue=${commitment.dueAt <= nowMillis} promise=${commitment.promise.take(180)} " +\n                    "last_result=${commitment.lastActionResult?.summary?.take(300).orEmpty()}",': '"- due=${commitment.dueAt} status=${commitment.status.name} " +\n                    "overdue=${commitment.dueAt <= nowMillis} promise=${commitment.promise.take(140)}",',
              'activeGoals.take(6).forEach': 'activeGoals.take(3).forEach',
              'recentLifeEvents.take(8).forEach': 'recentLifeEvents.take(3).forEach',
              'title=${event.title.take(120)} summary=${event.summary.take(240)} evidence=${event.evidenceReference.orEmpty().take(120)}': 'title=${event.title.take(100)} summary=${event.summary.take(160)}',
              'contextFacts.take(16).forEach': 'contextFacts.distinctBy { it.key }.take(6).forEach',
              'value=${fact.value.take(500)}': 'value=${fact.value.take(240)}',
          }
          for old, new in swaps.items():
              if old not in text:
                  raise SystemExit(f'missing prompt fragment: {old}')
              text = text.replace(old, new, 1)
          perception.write_text(text)
          PY
      - name: Run context tests
        run: |
          chmod +x gradlew
          ./gradlew :app:testDebugUnitTest --tests '*CompanionContext*' --tests '*CompanionPresenceContractTransformerTest' --tests '*CompanionPerception*' --stacktrace
      - name: Compile app
        run: ./gradlew :app:compileDebugKotlin --stacktrace
      - name: Commit refactor
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/src/main/java/me/rerere/rikkahub/data/ai/GenerationHandler.kt app/src/main/java/me/rerere/rikkahub/data/companion/CompanionPerception.kt
          git diff --cached --quiet && exit 0
          git commit -m 'refactor: reduce duplicated companion prompt context [skip ci]'
          git pull --rebase origin master
          git push origin HEAD:master
