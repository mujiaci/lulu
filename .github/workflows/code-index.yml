name: Refresh code index

on:
  push:
    branches: [master]
    paths-ignore:
      - "docs/architecture/CODE_INDEX.md"
      - "docs/architecture/code-index.json"
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: code-index-master
  cancel-in-progress: true

jobs:
  refresh:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip index]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate repository index
        env:
          INDEX_COMMIT: ${{ github.sha }}
          INDEX_BRANCH: ${{ github.ref_name }}
        run: python3 scripts/generate_code_index.py

      - name: Upload generated index for diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: repository-code-index
          path: |
            docs/architecture/CODE_INDEX.md
            docs/architecture/code-index.json
          retention-days: 7

      - name: Commit refreshed index
        run: |
          if git diff --quiet -- docs/architecture/CODE_INDEX.md docs/architecture/code-index.json; then
            echo "Code index is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/architecture/CODE_INDEX.md docs/architecture/code-index.json
          git commit -m "docs: refresh code index [skip ci] [skip index]"
          git pull --rebase origin master
          git push origin HEAD:master
