name: Verify performance monitor once

on:
  push:
    paths:
      - '.github/workflows/verify-performance-monitor-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply compile-safety cleanup
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('app/src/main/java/me/rerere/rikkahub/ui/pages/stats/StatsPage.kt')
          text = path.read_text(encoding='utf-8')
          if 'import androidx.compose.foundation.layout.weight\n' not in text:
              text = text.replace(
                  'import androidx.compose.foundation.layout.wrapContentWidth\n',
                  'import androidx.compose.foundation.layout.wrapContentWidth\nimport androidx.compose.foundation.layout.weight\n',
                  1,
              )
          text = text.replace('import androidx.compose.material3.PrimaryTabRow\n', 'import androidx.compose.material3.SecondaryTabRow\n')
          text = text.replace('PrimaryTabRow(selectedTabIndex = pagerState.currentPage)', 'SecondaryTabRow(selectedTabIndex = pagerState.currentPage)')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Commit verified changes
        run: |
          rm -f .github/workflows/verify-performance-monitor-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: verify performance monitor build"
          git push origin HEAD:master
