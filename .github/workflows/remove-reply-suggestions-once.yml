name: Remove reply suggestions once

on:
  pull_request:
    branches: [master]
    paths:
      - '.github/refactor-trigger.txt'

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Remove reply suggestion pipeline and tighten commitments
        shell: python
        run: |
          from pathlib import Path
          import re

          root = Path('.')

          def read(path):
              return (root / path).read_text(encoding='utf-8-sig')

          def write(path, text):
              (root / path).write_text(text, encoding='utf-8', newline='\n')

          def remove_braced_declaration(text, marker):
              pos = text.find(marker)
              if pos < 0:
                  return text, False
              line_start = text.rfind('\n', 0, pos) + 1
              start = line_start
              while start > 0:
                  prev_end = start - 1
                  prev_start = text.rfind('\n', 0, prev_end) + 1
                  if text[prev_start:prev_end].strip().startswith('@'):
                      start = prev_start
                  else:
                      break
              brace = text.find('{', pos)
              if brace < 0:
                  return text, False
              depth = 0
              in_string = False
              triple = False
              escaped = False
              i = brace
              while i < len(text):
                  if text.startswith('"""', i) and not escaped:
                      triple = not triple
                      i += 3
                      continue
                  ch = text[i]
                  if not triple:
                      if ch == '"' and not escaped:
                          in_string = not in_string
                      if not in_string:
                          if ch == '{': depth += 1
                          elif ch == '}':
                              depth -= 1
                              if depth == 0:
                                  end = i + 1
                                  while end < len(text) and text[end] in ' \t': end += 1
                                  if end < len(text) and text[end] == '\r': end += 1
                                  if end < len(text) and text[end] == '\n': end += 1
                                  return text[:start] + text[end:], True
                      escaped = (ch == '\\' and not escaped)
                      if ch != '\\': escaped = False
                  i += 1
              raise RuntimeError(f'Unbalanced declaration for {marker}')

          def remove_argument_block(text, argument_name):
              pattern = re.compile(r'(?m)^\s*' + re.escape(argument_name) + r'\s*=\s*\{')
              while True:
                  m = pattern.search(text)
                  if not m:
                      return text
                  brace = text.find('{', m.start())
                  depth = 0
                  in_string = False
                  escaped = False
                  i = brace
                  while i < len(text):
                      ch = text[i]
                      if ch == '"' and not escaped:
                          in_string = not in_string
                      if not in_string:
                          if ch == '{': depth += 1
                          elif ch == '}':
                              depth -= 1
                              if depth == 0:
                                  end = i + 1
                                  while end < len(text) and text[end] in ' \t': end += 1
                                  if end < len(text) and text[end] == ',': end += 1
                                  while end < len(text) and text[end] in ' \t\r\n': end += 1
                                  text = text[:m.start()] + text[end:]
                                  break
                      escaped = (ch == '\\' and not escaped)
                      if ch != '\\': escaped = False
                      i += 1
                  else:
                      raise RuntimeError(f'Unbalanced argument {argument_name}')

          # Conversation model: remove suggestions state.
          path = 'app/src/main/java/me/rerere/rikkahub/data/model/Conversation.kt'
          text = read(path)
          text = re.sub(r'(?m)^\s*val chatSuggestions: List<String> = emptyList\(\),\s*\n', '', text)
          write(path, text)

          # ViewModel: remove public suggestion generation entry.
          path = 'app/src/main/java/me/rerere/rikkahub/ui/pages/chat/ChatVM.kt'
          text = read(path)
          text, _ = remove_braced_declaration(text, 'fun generateSuggestion(')
          write(path, text)

          # Chat page: remove suggestion click plumbing.
          path = 'app/src/main/java/me/rerere/rikkahub/ui/pages/chat/ChatPage.kt'
          text = remove_argument_block(read(path), 'onClickSuggestion')
          write(path, text)

          # Chat list: remove suggestion parameters, rendering, component and imports.
          path = 'app/src/main/java/me/rerere/rikkahub/ui/pages/chat/ChatList.kt'
          text = read(path)
          text = re.sub(r'(?m)^\s*onClickSuggestion: \(String\) -> Unit = \{\},\s*\n', '', text)
          text = re.sub(r'(?m)^\s*onClickSuggestion: \(String\) -> Unit,\s*\n', '', text)
          text = re.sub(r'(?m)^\s*onClickSuggestion = onClickSuggestion,\s*\n', '', text)
          text = re.sub(r'(?ms)^\s*// Suggestion\s*\n\s*if \(conversation\.chatSuggestions\.isNotEmpty\(\) && !captureProgress\) \{.*?^\s*\}\s*\n', '', text)
          text, _ = remove_braced_declaration(text, 'private fun ChatSuggestionsRow(')
          for imp, token in [
              ('androidx.compose.foundation.background', '.background('),
              ('androidx.compose.foundation.lazy.LazyRow', 'LazyRow('),
              ('androidx.compose.foundation.lazy.items', 'items('),
              ('androidx.compose.foundation.shape.RoundedCornerShape', 'RoundedCornerShape('),
          ]:
              if token not in text:
                  text = re.sub(r'(?m)^import ' + re.escape(imp) + r'\s*\n', '', text)
          write(path, text)

          # Chat service: remove reset, generation calls and generator function.
          path = 'app/src/main/java/me/rerere/rikkahub/service/ChatService.kt'
          text = read(path)
          text = re.sub(r'(?m)^\s*// reset suggestions\s*\n\s*updateConversation\([^\n]*chatSuggestions = emptyList\(\)[^\n]*\)\s*\n', '', text)
          text = re.sub(r'(?ms)^\s*launchWithConversationReference\(conversationId\) \{\s*generateSuggestion\(conversationId, finalConversation\)\s*\}\s*\n', '', text)
          text = re.sub(r'(?m)^\s*appScope\.launch \{ generateSuggestion\([^\n]+\) \}\s*\n', '', text)
          text = re.sub(r'(?m)^\s*generateSuggestion\([^\n]+\)\s*\n', '', text)
          while 'fun generateSuggestion(' in text:
              text, changed = remove_braced_declaration(text, 'fun generateSuggestion(')
              if not changed: break

          # Only explicit recurring or ongoing wording can create long-term responsibilities.
          old = '''        val responsibilityUpserts = plan.responsibilityAnchorUpserts.mapNotNull { draft ->
              draft.toAlwaysOnAnchorOrNull('''
          if old not in text:
              raise RuntimeError('Could not find responsibilityUpserts block')
          text = text.replace(old, '''        val latestUserTextForResponsibility = messages
              .lastOrNull { it.role == MessageRole.USER }
              ?.toText()
              .orEmpty()
          val responsibilityUpserts = if (latestUserTextForResponsibility.hasExplicitLongTermCadence()) {
              plan.responsibilityAnchorUpserts.mapNotNull { draft ->
                  draft.toAlwaysOnAnchorOrNull(''', 1)
          anchor = '                nowMillis = nowMillis,\n            )\n        }\n        if (responsibilityUpserts.isNotEmpty()'
          replacement = '                nowMillis = nowMillis,\n                  )\n              }\n          } else {\n              emptyList()\n          }\n          if (responsibilityUpserts.isNotEmpty()'
          if anchor not in text:
              raise RuntimeError('Could not close responsibility gate')
          text = text.replace(anchor, replacement, 1)

          helper = '''
          private fun String.hasExplicitLongTermCadence(): Boolean {
              val compact = lowercase().replace(" ", "")
              return LONG_TERM_RESPONSIBILITY_MARKERS.any { marker -> marker in compact }
          }

          private val LONG_TERM_RESPONSIBILITY_MARKERS = listOf(
              "每天", "每日", "天天", "每早", "每晚", "每个早上", "每个中午", "每个晚上",
              "每周", "每月", "长期", "一直", "以后都", "从今以后", "固定时间", "定期",
              "持续监督", "持续提醒", "长期监督", "长期提醒", "养成习惯", "每次都",
          )
          '''
          insert_at = text.rfind('\n}')
          text = text[:insert_at] + '\n' + helper + text[insert_at:]
          write(path, text)

          # Remove settings keys, fields, defaults, prompt and UI references.
          for p in root.rglob('*'):
              if not p.is_file() or p.suffix not in {'.kt', '.xml'}:
                  continue
              rel = p.as_posix()
              if rel.endswith(('ChatService.kt', 'ChatList.kt', 'ChatPage.kt', 'ChatVM.kt', 'Conversation.kt')):
                  continue
              raw = p.read_text(encoding='utf-8-sig')
              original = raw
              if p.suffix == '.kt':
                  raw = re.sub(r'(?m)^import .*DEFAULT_SUGGESTION_PROMPT\s*\n', '', raw)
                  raw = re.sub(r'(?m)^\s*val SUGGESTION_MODEL = .*\n', '', raw)
                  raw = re.sub(r'(?m)^\s*val SUGGESTION_PROMPT = .*\n', '', raw)
                  raw = re.sub(r'(?m)^\s*(val|var)\s+suggestionModelId\s*:[^\n]+\n', '', raw)
                  raw = re.sub(r'(?m)^\s*(val|var)\s+suggestionPrompt\s*:[^\n]+\n', '', raw)
                  raw = re.sub(r'(?m)^\s*suggestionModelId\s*=.*\n', '', raw)
                  raw = re.sub(r'(?m)^\s*suggestionPrompt\s*=.*\n', '', raw)
                  raw = re.sub(r'(?m)^\s*preferences\[SUGGESTION_MODEL\].*\n', '', raw)
                  raw = re.sub(r'(?m)^\s*preferences\[SUGGESTION_PROMPT\].*\n', '', raw)
                  if 'DEFAULT_SUGGESTION_PROMPT' in raw:
                      start = raw.find('internal val DEFAULT_SUGGESTION_PROMPT')
                      if start >= 0:
                          triple_start = raw.find('"""', start)
                          triple_end = raw.find('"""', triple_start + 3)
                          end = raw.find('.trimIndent()', triple_end) + len('.trimIndent()')
                          while end < len(raw) and raw[end] in ' \t\r\n': end += 1
                          raw = raw[:start] + raw[end:]
                  # Remove obvious setting rows/components dedicated to suggestion model/prompt.
                  raw = re.sub(r'(?ms)^\s*[^\n{]*(Suggestion|suggestion)[^\n{]*(Model|Prompt)[^\n{]*\{.*?^\s*\}\s*\n', '', raw)
              else:
                  raw = re.sub(r'(?mi)^\s*<string[^>]+name="[^"]*suggestion[^"]*"[^>]*>.*?</string>\s*\n?', '', raw)
                  raw = re.sub(r'(?mi)^\s*<string[^>]*>[^<]*(回复建议|聊天建议)[^<]*</string>\s*\n?', '', raw)
              if raw != original:
                  p.write_text(raw, encoding='utf-8', newline='\n')

          # Tight input layout: no suggestion row gap and no stacked nav-bar inset above IME.
          path = 'app/src/main/java/me/rerere/rikkahub/ui/components/ai/ChatInput.kt'
          text = read(path)
          text = text.replace('                .imePadding()\n                .navigationBarsPadding()\n                .padding(horizontal = 8.dp),\n            verticalArrangement = Arrangement.spacedBy(8.dp)',
                              '                .imePadding()\n                .padding(horizontal = 8.dp),\n            verticalArrangement = Arrangement.spacedBy(0.dp)')
          write(path, text)

          residual = []
          for p in root.rglob('*.kt'):
              if '/build/' in p.as_posix() or '/test/' in p.as_posix() or '/androidTest/' in p.as_posix():
                  continue
              data = p.read_text(encoding='utf-8-sig')
              for token in ('generateSuggestion(', 'chatSuggestions', 'DEFAULT_SUGGESTION_PROMPT', 'suggestionModelId', 'suggestionPrompt'):
                  if token in data:
                      residual.append(f'{p}: {token}')
          if residual:
              raise RuntimeError('Suggestion pipeline remains:\n' + '\n'.join(residual))

      - name: Compile Android
        run: ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace

      - name: Commit directly to master
        shell: bash
        run: |
          rm -f .github/workflows/remove-reply-suggestions-once.yml
          rm -f .github/refactor-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: remove reply suggestions and separate long-term commitments"
          git push origin master
