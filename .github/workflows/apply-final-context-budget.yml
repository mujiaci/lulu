name: Apply final context budget

on:
  push:
    branches: [master]
    paths:
      - scripts/apply_final_context_budget.py
      - app/src/main/java/me/rerere/rikkahub/data/ai/FinalCompanionContextBudget.kt
      - app/src/test/java/me/rerere/rikkahub/data/ai/FinalCompanionContextBudgetTest.kt
      - .github/workflows/apply-final-context-budget.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply provider-bound budget gate
        run: python3 scripts/apply_final_context_budget.py

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Run focused tests
        run: ./gradlew :app:testDebugUnitTest --tests '*FinalCompanionContextBudgetTest' --stacktrace

      - name: Compile debug Kotlin
        run: ./gradlew :app:compileDebugKotlin --stacktrace

      - name: Commit applied change
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/me/rerere/rikkahub/data/ai/GenerationHandler.kt
          git commit -m "feat: enforce provider-bound 15k context budget [skip index]"
          git pull --rebase origin master
          git push origin HEAD:master
