name: APK Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag. Leave empty to use debug-build-<run_number>."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Gradle Build
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Collect APK files
        run: |
          set -euo pipefail
          mkdir -p apk-artifacts
          cp app/build/outputs/apk/debug/*.apk apk-artifacts/
          ls -lh apk-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: apk-artifacts/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          tag="$RELEASE_TAG"
          if [ -z "$tag" ]; then
            tag="debug-build-${GITHUB_RUN_NUMBER}"
          fi

          title="Lulu ${tag}"
          notes="Automated debug APK build from ${GITHUB_SHA}."

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" apk-artifacts/*.apk --clobber
          else
            gh release create "$tag" apk-artifacts/*.apk --title "$title" --notes "$notes"
          fi
