name: Signed APK Build

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag. Leave empty to use signed-build-<run_number>."
        required: false
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: signed-apk-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install web-ui dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web-ui

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Prepare signing files
        run: |
          set -euo pipefail
          {
            echo "storeFile=release-public.key"
            echo "storePassword=lulu-release-password"
            echo "keyAlias=lulu"
            echo "keyPassword=lulu-release-password"
          } > local.properties

      - name: Companion and memory regression tests
        id: regression_tests
        run: |
          mkdir -p ci-logs
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon --no-build-cache clean :app:testDebugUnitTest \
            --tests "*CompanionLifeClaimOutputTransformerTest" \
            --tests "*CompanionGameToolTest" \
            --tests "*CompanionIntentPlannerTest" \
            --tests "*AffectivePrivateImpressionTest" \
            --tests "*MemoryArchiveTest" \
            --tests "*CompanionRuntimeReducerTest" \
            --tests "*CompanionRelationshipInitializationTest" \
            --tests "*CompanionCommitmentReducerTest" \
            --tests "*CompanionResponsibilitySplitterTest" \
            --tests "*CompanionExplainableStateTest" \
            --tests "*CompanionPerceptionLegacyStateTest" \
            --tests "*CompanionInteractionTimelineTest" \
            --tests "*CompanionHeartbeatTest" \
            --tests "*MemoryBankContextTest" \
            --tests "*MemoryBankServiceExtractionTest" \
            --tests "*AILoggingManagerTest" \
            --tests "*CompanionContextEnvelopeTest" \
            --tests "*PromptInjectionTransformerTest" \
            --tests "*CompanionPresenceStateTest" \
            --tests "*CompanionTurnReminderPlannerTest" \
            --tests "*LuluStatusDialogTest" \
            --tests "*StudyRulesTest" \
            --tests "*CompanionLifeEventFactoryTest" \
            --tests "*CompanionDigitalActivitiesTest" \
            --tests "*LuluExpressionOutputTransformerTest" \
            --tests "*CompanionPresenceContractTransformerTest" 2>&1 | tee ci-logs/regression-tests.log

      - name: Android Lint
        id: android_lint
        run: |
          mkdir -p ci-logs
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon --no-build-cache :app:lintRelease 2>&1 | tee ci-logs/android-lint.log

      - name: Gradle Build
        id: gradle_build
        run: |
          mkdir -p ci-logs
          set -o pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon --no-build-cache assembleRelease -x uploadCrashlyticsMappingFileRelease 2>&1 | tee ci-logs/gradle-build.log

      - name: Collect APK files
        run: |
          set -euo pipefail
          mkdir -p apk-artifacts
          release_apk="$(find app/build/outputs/apk/release -name '*-release.apk' -print -quit)"
          if [ -z "$release_apk" ]; then
            echo "::error title=Missing release APK::Could not find the release APK."
            find app/build/outputs/apk/release -name '*.apk' -print
            exit 1
          fi
          cp "$release_apk" apk-artifacts/lulu-signed.apk
          ls -lh apk-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: signed-apk
          path: apk-artifacts/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}
        run: |
          set -euo pipefail

          tag="$RELEASE_TAG"
          if [ -z "$tag" ]; then
            tag="signed-build-${GITHUB_RUN_NUMBER}"
          fi

          title="Lulu ${tag}"
          notes="Automated signed APK build from ${GITHUB_SHA}."

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" apk-artifacts/*.apk --clobber
          else
            gh release create "$tag" apk-artifacts/*.apk --title "$title" --notes "$notes"
          fi

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-logs-${{ github.run_number }}
          path: ci-logs/*.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        env:
          STEPS_CONTEXT: ${{ toJson(steps) }}
        with:
          script: |
            const fs = require("fs")
            const path = require("path")

            const logDir = "ci-logs"
            const logFiles = fs.existsSync(logDir)
              ? fs.readdirSync(logDir)
                  .filter(name => name.endsWith(".log"))
                  .map(name => path.join(logDir, name))
              : []

            const allLines = logFiles.flatMap(file => {
              const heading = ["", "===== " + file + " ====="]
              const lines = fs.readFileSync(file, "utf8").split(/\r?\n/)
              return heading.concat(lines)
            })

            const importantPattern = /(^e: |FAILURE:|What went wrong:|Execution failed|Compilation error|Unresolved reference|error:|Exception|BUILD FAILED)/i
            let summaryLines = allLines.filter(line => importantPattern.test(line)).slice(-100)
            if (summaryLines.length === 0) {
              summaryLines = allLines.slice(-120)
            }

            let errorSummary = summaryLines.join("\n").trim()
            if (!errorSummary) {
              let steps = {}
              try {
                steps = JSON.parse(process.env.STEPS_CONTEXT || "{}")
              } catch (_) {}
              const failedSteps = Object.entries(steps)
                .filter(([, value]) => value && value.outcome === "failure")
                .map(([name]) => name)
              errorSummary = failedSteps.length
                ? "Failed steps: " + failedSteps.join(", ")
                : "The workflow failed before a Gradle log was produced. Open the run link for details."
            }
            errorSummary = errorSummary.slice(-7000)

            const shortSha = context.sha.slice(0, 7)
            const marker = "<!-- lulu-ci-failure:" + context.sha + " -->"
            const runUrl = "https://github.com/" + context.repo.owner + "/" + context.repo.repo +
              "/actions/runs/" + context.runId
            const commitUrl = "https://github.com/" + context.repo.owner + "/" + context.repo.repo +
              "/commit/" + context.sha
            const title = "[CI] Build failed on " + shortSha
            const body = [
              marker,
              "## Lulu 自动构建失败",
              "",
              "- **运行：** " + runUrl,
              "- **提交：** [" + shortSha + "](" + commitUrl + ")",
              "- **分支：** `" + context.ref.replace("refs/heads/", "") + "`",
              "",
              "## 错误摘要",
              "",
              "```text",
              errorSummary,
              "```",
              "",
              "完整日志也已作为本次 Action 的 `ci-failure-logs` artifact 上传。"
            ].join("\n")

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            })
            const existing = openIssues.find(issue =>
              !issue.pull_request && (issue.body || "").includes(marker)
            )
            if (existing) {
              core.info("Failure issue already exists: #" + existing.number)
              return
            }

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            })
            core.notice("Created failure issue #" + issue.number)
