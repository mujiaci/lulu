name: Signed APK Build

on:
  push:
    branches:
      - master
    paths-ignore:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag. Leave empty to use signed-build-<run_number>."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: signed-apk-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install web-ui dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web-ui

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Prepare signing files
        run: |
          set -euo pipefail
          {
            echo "storeFile=release-public.key"
            echo "storePassword=lulu-release-password"
            echo "keyAlias=lulu"
            echo "keyPassword=lulu-release-password"
          } > local.properties

      - name: Gradle Build
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Collect APK files
        run: |
          set -euo pipefail
          mkdir -p apk-artifacts
          universal_apk="$(find app/build/outputs/apk/release -name '*universal*.apk' -print -quit)"
          if [ -z "$universal_apk" ]; then
            echo "::error title=Missing universal APK::Could not find the universal release APK."
            find app/build/outputs/apk/release -name '*.apk' -print
            exit 1
          fi
          cp "$universal_apk" apk-artifacts/lulu-signed.apk
          ls -lh apk-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: signed-apk
          path: apk-artifacts/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}
        run: |
          set -euo pipefail

          tag="$RELEASE_TAG"
          if [ -z "$tag" ]; then
            tag="signed-build-${GITHUB_RUN_NUMBER}"
          fi

          title="Lulu ${tag}"
          notes="Automated signed APK build from ${GITHUB_SHA}."

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" apk-artifacts/*.apk --clobber
          else
            gh release create "$tag" apk-artifacts/*.apk --title "$title" --notes "$notes"
          fi
