name: Signed APK Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag. Leave empty to use signed-build-<run_number>."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Prepare signing files
        env:
          KEY_BASE64: ${{ secrets.KEY_BASE64 }}
          SIGNING_CONFIG: ${{ secrets.SIGNING_CONFIG }}
        run: |
          set -euo pipefail

          if [ -z "$KEY_BASE64" ] || [ -z "$SIGNING_CONFIG" ]; then
            echo "::error title=Missing signing secrets::Signed builds require KEY_BASE64 and SIGNING_CONFIG."
            exit 1
          fi

          printf '%s' "$KEY_BASE64" | base64 -d > app/app.key
          printf '%s' "$SIGNING_CONFIG" > local.properties

      - name: Gradle Build
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Collect APK files
        run: |
          set -euo pipefail
          mkdir -p apk-artifacts
          cp app/build/outputs/apk/release/*.apk apk-artifacts/
          ls -lh apk-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: signed-apk
          path: apk-artifacts/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          tag="$RELEASE_TAG"
          if [ -z "$tag" ]; then
            tag="signed-build-${GITHUB_RUN_NUMBER}"
          fi

          title="Lulu ${tag}"
          notes="Automated signed APK build from ${GITHUB_SHA}."

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" apk-artifacts/*.apk --clobber
          else
            gh release create "$tag" apk-artifacts/*.apk --title "$title" --notes "$notes"
          fi
