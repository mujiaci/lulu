name: Signed APK Build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: signed-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install web dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      - name: Prepare signing
        run: |
          cat > local.properties <<'EOF'
          storeFile=release-public.key
          storePassword=lulu-release-password
          keyAlias=lulu
          keyPassword=lulu-release-password
          EOF

      - name: Build signed release APK
        run: |
          mkdir -p ci-logs
          chmod +x ./gradlew
          set -o pipefail
          ./gradlew --no-daemon --no-build-cache assembleRelease -x uploadCrashlyticsMappingFileRelease 2>&1 | tee ci-logs/build.log

      - name: Collect APK
        run: |
          set -euo pipefail
          mkdir -p apk-artifacts
          apk="$(find app/build/outputs/apk/release -name '*-release.apk' -print -quit)"
          test -n "$apk"
          cp "$apk" apk-artifacts/lulu-signed.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk-${{ github.run_number }}
          path: apk-artifacts/lulu-signed.apk
          if-no-files-found: error

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="signed-build-${GITHUB_RUN_NUMBER}"
          gh release create "$tag" apk-artifacts/lulu-signed.apk \
            --title "Lulu ${tag}" \
            --notes "Automated signed APK build from ${GITHUB_SHA}."

      - name: Report successful build
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 25,
              body: [
                '✅ Signed APK 编译成功。',
                '',
                `- 提交：\`${context.sha.slice(0, 7)}\``,
                `- Release：\`signed-build-${context.runNumber}\``,
                `- 运行：https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              ].join('\n')
            })

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-logs-${{ github.run_number }}
          path: ci-logs/*.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const lines = fs.existsSync('ci-logs/build.log')
              ? fs.readFileSync('ci-logs/build.log', 'utf8').split(/\r?\n/)
              : []
            const pattern = /(^e: |FAILURE:|What went wrong:|Execution failed|Compilation error|Unresolved reference|error:|Exception|BUILD FAILED)/i
            const selected = lines.filter(line => pattern.test(line)).slice(-100)
            const summary = (selected.length ? selected : lines.slice(-120)).join('\n').slice(-7000)
            const shortSha = context.sha.slice(0, 7)
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CI] Build failed on ${shortSha}`,
              body: [
                `<!-- lulu-ci-failure:${context.sha} -->`,
                '## Lulu 自动构建失败',
                '',
                `- **运行：** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `- **提交：** ${shortSha}`,
                '',
                '```text',
                summary || 'Workflow failed before a Gradle log was produced.',
                '```'
              ].join('\n')
            })
