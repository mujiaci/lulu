name: Polish voice call once

on:
  push:
    paths:
      - '.github/workflows/polish-voice-call-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply voice call visual polish
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('app/src/main/java/me/rerere/rikkahub/ui/pages/voicecall/VoiceCallPage.kt')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              'listOf(Color(0xFFFFF8F3), Color(0xFFF4EFF8), Color(0xFFEAF2F6)),',
              'listOf(Color(0xFFFFFBF8), Color(0xFFF5F0FA), Color(0xFFE8F3F7)),',
              1,
          )
          text = text.replace('shape = RoundedCornerShape(32.dp),', 'shape = RoundedCornerShape(28.dp),', 1)
          text = text.replace('color = Color.White.copy(alpha = 0.72f),', 'color = Color.White.copy(alpha = 0.84f),', 1)
          text = text.replace('shadowElevation = 5.dp,', 'shadowElevation = 2.dp,', 1)
          text = text.replace('modifier = Modifier.fillMaxWidth().padding(18.dp),', 'modifier = Modifier.fillMaxWidth().padding(horizontal = 16.dp, vertical = 14.dp),', 1)
          text = text.replace('horizontalArrangement = Arrangement.spacedBy(18.dp),', 'horizontalArrangement = Arrangement.spacedBy(14.dp),', 1)
          text = text.replace('modifier = Modifier.size(122.dp),', 'modifier = Modifier.size(92.dp),', 1)
          text = text.replace('modifier = Modifier.size(108.dp),', 'modifier = Modifier.size(84.dp),', 1)
          text = text.replace('modifier = Modifier.size(100.dp).clip(CircleShape),', 'modifier = Modifier.size(78.dp).clip(CircleShape),', 1)
          text = text.replace('style = MaterialTheme.typography.headlineMedium,', 'style = MaterialTheme.typography.headlineSmall,', 1)

          old = '''            if (stage == CallStage.Ringing) {
                Surface(
                    modifier = Modifier.weight(1f).fillMaxWidth(),
                    color = Color.White.copy(alpha = 0.76f),
                    shape = MaterialTheme.shapes.extraLarge,
                ) {
                    Box(contentAlignment = Alignment.Center) {
                        Column(
                            horizontalAlignment = Alignment.CenterHorizontally,
                            verticalArrangement = Arrangement.spacedBy(10.dp),
                            modifier = Modifier.padding(24.dp),
                        ) {
                            Text(
                                "语音来电",
                                color = Color(0xFF303744),
                                style = MaterialTheme.typography.headlineSmall,
                                fontWeight = FontWeight.SemiBold,
                            )
                            Text(
                                "接听后会从最近的聊天和共同经历自然继续。",
                                color = Color(0xFF747D8E),
                                style = MaterialTheme.typography.bodyMedium,
                            )
                        }
                    }
                }
            } else if (stage == CallStage.Idle && !isHistoryOnly) {'''

          new = '''            if (stage == CallStage.Ringing) {
                val pulseTransition = rememberInfiniteTransition(label = "incoming_call_pulse")
                val pulseScale by pulseTransition.animateFloat(
                    initialValue = 0.94f,
                    targetValue = 1.06f,
                    animationSpec = infiniteRepeatable(
                        animation = tween(durationMillis = 1_500),
                        repeatMode = RepeatMode.Reverse,
                    ),
                    label = "incoming_call_pulse_scale",
                )
                Surface(
                    modifier = Modifier.weight(1f).fillMaxWidth(),
                    color = Color.White.copy(alpha = 0.42f),
                    shape = RoundedCornerShape(36.dp),
                ) {
                    Box(contentAlignment = Alignment.Center) {
                        Column(
                            horizontalAlignment = Alignment.CenterHorizontally,
                            verticalArrangement = Arrangement.spacedBy(18.dp),
                            modifier = Modifier.padding(horizontal = 28.dp, vertical = 36.dp),
                        ) {
                            Box(
                                modifier = Modifier.size(236.dp),
                                contentAlignment = Alignment.Center,
                            ) {
                                Surface(
                                    modifier = Modifier.size(220.dp).scale(pulseScale),
                                    shape = CircleShape,
                                    color = Color(0x1F7EA6C9),
                                ) {}
                                Surface(
                                    modifier = Modifier.size(168.dp),
                                    shape = CircleShape,
                                    color = Color(0x337EA6C9),
                                ) {}
                                Surface(
                                    modifier = Modifier.size(112.dp),
                                    shape = CircleShape,
                                    color = Color.White.copy(alpha = 0.90f),
                                    shadowElevation = 8.dp,
                                ) {
                                    Box(contentAlignment = Alignment.Center) {
                                        Icon(
                                            imageVector = HugeIcons.Call02,
                                            contentDescription = null,
                                            modifier = Modifier.size(46.dp),
                                            tint = Color(0xFF557FA4),
                                        )
                                    }
                                }
                            }
                            Column(
                                horizontalAlignment = Alignment.CenterHorizontally,
                                verticalArrangement = Arrangement.spacedBy(8.dp),
                            ) {
                                Text(
                                    "${assistantName} 正在呼叫你",
                                    color = Color(0xFF303744),
                                    style = MaterialTheme.typography.headlineSmall,
                                    fontWeight = FontWeight.Bold,
                                )
                                Text(
                                    incomingReason.takeIf(String::isNotBlank)
                                        ?: "接听后，会自然延续你们最近的聊天。",
                                    color = Color(0xFF747D8E),
                                    style = MaterialTheme.typography.bodyMedium,
                                    maxLines = 3,
                                    overflow = TextOverflow.Ellipsis,
                                )
                            }
                        }
                    }
                }
            } else if (stage == CallStage.Idle && !isHistoryOnly) {'''

          if old not in text:
              raise SystemExit('ringing panel block not found')
          text = text.replace(old, new, 1)

          text = text.replace(
              'modifier = Modifier.fillMaxWidth().padding(bottom = 24.dp),\n                        horizontalArrangement = Arrangement.spacedBy(18.dp),',
              'modifier = Modifier.fillMaxWidth().padding(bottom = 22.dp),\n                        horizontalArrangement = Arrangement.spacedBy(14.dp),',
              1,
          )
          text = text.replace(
              'modifier = Modifier.weight(1f).height(58.dp),\n                        ) {\n                            Icon(HugeIcons.Cancel01',
              'modifier = Modifier.weight(1f).height(64.dp),\n                            shape = RoundedCornerShape(22.dp),\n                            colors = ButtonDefaults.filledTonalButtonColors(\n                                containerColor = Color.White.copy(alpha = 0.72f),\n                                contentColor = Color(0xFF4D5665),\n                            ),\n                        ) {\n                            Icon(HugeIcons.Cancel01',
              1,
          )
          text = text.replace(
              'modifier = Modifier.weight(1f).height(58.dp),\n                            colors = ButtonDefaults.buttonColors(',
              'modifier = Modifier.weight(1f).height(64.dp),\n                            shape = RoundedCornerShape(22.dp),\n                            colors = ButtonDefaults.buttonColors(',
              1,
          )
          text = text.replace('containerColor = Color(0xFF6F91B2),', 'containerColor = Color(0xFF557FA4),', 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Commit polished page
        run: |
          rm -f .github/workflows/polish-voice-call-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: polish incoming voice call screen"
          git push origin HEAD:master
